version: '3.8'
services:
  # Node.js API service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - .:/campus_exchange/Backend
      - /campus_exchange/Backend/node_modules
    env_file: 
      - .env
    networks:
      - campus-network


networks:
  campus-network:
    driver: bridge
