<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusExchange - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Login View -->
        <div id="login-view" class="view active">
            <div class="glass-card login-card">
                <h2>Admin Login</h2>
                <p>CampusExchange Control Panel</p>
                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" required placeholder="admin">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn primary-btn">Login to Dashboard</button>
                    <div id="login-error" class="error-msg"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <nav class="navbar">
                <div class="logo">CampusExchange Admin</div>
                <button id="logout-btn" class="btn secondary-btn">Logout</button>
            </nav>
            <div class="dashboard-container">
                <!-- Add Bet Section -->
                <div class="glass-card section-card">
                    <h3>➕ Create New Bet</h3>
                    <form id="create-bet-form">
                        <div class="input-group">
                            <label>Bet ID (Unique string)</label>
                            <input type="text" id="betId" required placeholder="e.g. MATCH01">
                        </div>
                        <div class="input-group">
                            <label>Question</label>
                            <input type="text" id="betQuestion" required placeholder="Who will win the finals?">
                        </div>
                        <div class="input-group">
                            <label>Description</label>
                            <input type="text" id="betDesc" placeholder="Details about the bet...">
                        </div>
                        <div class="input-group">
                            <label>Actual Result (Hidden from users until closed)</label>
                            <input type="text" id="betResult" required placeholder="Team A">
                        </div>
                        <div class="input-group">
                            <label>Result Time</label>
                            <input type="datetime-local" id="betTime" required>
                        </div>
                        <button type="submit" class="btn primary-btn">Create Bet</button>
                        <div id="bet-msg" class="msg"></div>
                    </form>
                </div>

                <!-- Add Stock Section -->
                <div class="glass-card section-card">
                    <h3>📈 Add New Stock</h3>
                    <form id="create-stock-form">
                        <div class="input-group">
                            <label>Stock ID (Ticker)</label>
                            <input type="text" id="stockId" required placeholder="AAPL">
                        </div>
                        <div class="input-group">
                            <label>Company Name</label>
                            <input type="text" id="stockName" required placeholder="Apple Inc.">
                        </div>
                        <div class="input-group">
                            <label>Initial Price (Coins)</label>
                            <input type="number" id="stockPrice" required min="1" step="0.01" placeholder="150.00">
                        </div>
                        <button type="submit" class="btn primary-btn">Add Stock</button>
                        <div id="stock-msg" class="msg"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
